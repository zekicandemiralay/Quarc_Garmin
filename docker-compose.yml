services:

  db:
    image: postgres:16
    container_name: garmin_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  sync:
    build: ./sync
    container_name: garmin_sync
    restart: unless-stopped
    env_file: .env
    environment:
      GPS_BATCH_SIZE: 50   # polylines fetched per sync cycle — raise to 200 for faster catch-up
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./garth_tokens:/root/.garth  # pre-generated tokens from garmin_login.py (no password needed)

  api:
    build: ./api
    container_name: garmin_api
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: garmin_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
